<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Квантовое поле</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
            top: 0;
            left: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            cursor: none;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none;
            z-index: 1;
            cursor: none;
        }

        .cursor {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.8), 0 0 4px rgba(255, 255, 255, 0.3), inset 0 0 4px rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.15s, height 0.15s, border-color 0.15s, box-shadow 0.15s;
            display: none;
        }
        .cursor.active {
            width: 18px;
            height: 18px;
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 16px rgba(0, 0, 0, 0.9), 0 0 8px rgba(255, 255, 255, 0.5), inset 0 0 6px rgba(255, 255, 255, 0.3);
        }
        @media (hover: hover) and (pointer: fine) {
            .cursor { display: block; }
        }

        .menu-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            pointer-events: auto;
        }
        .menu-toggle:hover { background: rgba(255,255,255,0.15); }
        .menu-toggle svg {
            width: 20px;
            height: 20px;
            stroke: rgba(255,255,255,0.8);
            fill: none;
            stroke-width: 2;
            transition: transform 0.3s;
        }
        .menu.open .menu-toggle svg { transform: rotate(90deg); }

        .side-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 280px;
            height: 100%;
            z-index: 9;
            background: rgba(10,10,20,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 24px 20px;
            transition: right 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            overflow-y: auto;
            overflow-x: hidden;
            pointer-events: auto;
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
        }
        .side-panel::-webkit-scrollbar { display: none; }
        .side-panel { scrollbar-width: none; }

        .menu.open .side-panel { right: 0; }

        .side-panel h3 {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            margin-top: 8px;
        }

        .dropdown-section {
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 8px;
        }

        .dropdown-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
            user-select: none;
            position: sticky;
            top: 0;
            background: rgba(10,10,20,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 2;
        }
        .dropdown-header:hover { background: rgba(255,255,255,0.08); }

        .dropdown-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dropdown-header-icon {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .dropdown-header-label {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .dropdown-header-current {
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            margin-left: auto;
            margin-right: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90px;
        }
        .dropdown-arrow {
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            transition: transform 0.3s;
            flex-shrink: 0;
        }
        .dropdown-section.open .dropdown-arrow {
            transform: rotate(180deg);
        }

        .dropdown-content {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s ease;
        }
        .dropdown-section.open .dropdown-content {
            max-height: 600px;
            overflow-y: auto;
            overflow-x: hidden;
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
        }
        .dropdown-content::-webkit-scrollbar { display: none; }
        .dropdown-content { scrollbar-width: none; }

        .option-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 4px 0 8px 0;
        }

        .category-title {
            color: rgba(255,255,255,0.35);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 12px 4px 12px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 9px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid transparent;
        }
        .option-item:hover { background: rgba(255,255,255,0.05); }
        .option-item.active {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }

        .option-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            background: rgba(255,255,255,0.08);
        }
        .option-item.active .option-icon {
            background: rgba(255,255,255,0.18);
        }

        .option-label {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 400;
            white-space: nowrap;
        }

        .palette-swatch {
            width: 36px;
            height: 18px;
            border-radius: 5px;
            flex-shrink: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .menu.open .overlay {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <canvas id="vortex"></canvas>

    <div class="menu" id="menu">
        <div class="overlay" id="overlay"></div>
        <button class="menu-toggle" id="menuToggle">
            <svg viewBox="0 0 24 24">
                <line x1="4" y1="6" x2="20" y2="6"/>
                <line x1="4" y1="12" x2="20" y2="12"/>
                <line x1="4" y1="18" x2="20" y2="18"/>
            </svg>
        </button>
        <div class="side-panel" id="sidePanel">
            <h3>Настройки</h3>

            <div class="dropdown-section" id="modeSection">
                <div class="dropdown-header" id="modeHeader">
                    <div class="dropdown-header-left">
                        <span class="dropdown-header-icon">🌀</span>
                        <span class="dropdown-header-label">Режим</span>
                    </div>
                    <span class="dropdown-header-current" id="modeCurrent">Вихрь</span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="dropdown-content" id="modeContent">
                    <div class="option-list" id="modeList"></div>
                </div>
            </div>

            <div class="dropdown-section" id="paletteSection">
                <div class="dropdown-header" id="paletteHeader">
                    <div class="dropdown-header-left">
                        <span class="dropdown-header-icon">🎨</span>
                        <span class="dropdown-header-label">Палитра</span>
                    </div>
                    <span class="dropdown-header-current" id="paletteCurrent">4K UI</span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="dropdown-content" id="paletteContent">
                    <div class="option-list" id="paletteList"></div>
                </div>
            </div>
        </div>
    </div>

        // КАСТОМНЫЙ КУРСОР
        // ============================================================
        const cursorEl = document.getElementById('cursor');
        const isDesktop = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

        if (isDesktop) {
            document.addEventListener('mousemove', (e) => {
                cursorEl.style.left = e.clientX + 'px';
                cursorEl.style.top = e.clientY + 'px';
            });
            document.addEventListener('mousedown', () => cursorEl.classList.add('active'));
            document.addEventListener('mouseup', () => cursorEl.classList.remove('active'));
        }

        // ============================================================
        // МЕНЮ
        // ============================================================
        const menu = document.getElementById('menu');
        const menuToggle = document.getElementById('menuToggle');
        const overlay = document.getElementById('overlay');
        const sidePanel = document.getElementById('sidePanel');

        let menuOpen = false;

        function toggleMenu() {
            menuOpen = !menuOpen;
            menu.classList.toggle('open', menuOpen);
        }

        menuToggle.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
        overlay.addEventListener('click', toggleMenu);

        sidePanel.addEventListener('click', (e) => { e.stopPropagation(); });
        sidePanel.addEventListener('touchmove', (e) => { e.stopPropagation(); });
        sidePanel.addEventListener('touchstart', (e) => { e.stopPropagation(); });

        // ВЫПАДАЮЩИЕ СПИСКИ

            const section = document.getElementById(sectionId);
            const header = document.getElementById(headerId);
            header.addEventListener('click', (e) => {
                e.stopPropagation();
                section.classList.toggle('open');
            });
        }

                    { pos: 0.60, h: 55, s: 1.0, v: 1.0 },
                    { pos: 1.00, h: 0, s: 0, v: 0 },
                ]
            },
            mountain: {
                name: 'Рассвет в горах',
                swatch: 'linear-gradient(to right, #3c096c, #9d4edd, #ff6d6d, #ffca3a)',
                stops: [
                    { pos: 0.00, h: 265, s: 0.9, v: 0.3 },
                    { pos: 0.30, h: 275, s: 0.7, v: 0.6 },
                    { pos: 0.60, h: 355, s: 0.7, v: 0.9 },
                    { pos: 1.00, h: 50, s: 0.8, v: 1.0 },
                ]
            },
        };

        let currentPalette = 'default';

        // ============================================================
        // СТРОИМ МЕНЮ
        // ============================================================
        function buildModeList() {
            const list = document.getElementById('modeList');
            list.innerHTML = '';

            modeCategories.forEach(cat => {
                // Заголовок категории
                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = cat.name;
                list.appendChild(title);

                // Режимы в категории
                cat.modes.forEach(mode => {
                    const div = document.createElement('div');
                    div.className = 'option-item' + (mode.key === currentMode ? ' active' : '');
                    div.innerHTML = `
                        <div class="option-icon">${mode.icon}</div>
                        <span class="option-label">${mode.name}</span>
                    `;
                    div.addEventListener('click', function(e) {
                        e.stopPropagation();
                        currentMode = mode.key;
                        document.getElementById('modeCurrent').textContent = mode.name;
                        buildModeList();
                    });
                    list.appendChild(div);
                });
            });
        }

        function buildPaletteList() {
            const list = document.getElementById('paletteList');
            list.innerHTML = '';
            const keys = Object.keys(palettes);
            keys.forEach(key => {
                const palette = palettes[key];
                const div = document.createElement('div');
                div.className = 'option-item' + (key === currentPalette ? ' active' : '');
                div.innerHTML = `
                    <div class="palette-swatch" style="background: ${palette.swatch};"></div>
                    <span class="option-label">${palette.name}</span>
                `;
                div.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (!palettes[key]) return;
                    if (transitionProgress >= 1) {
                        currentStops = JSON.parse(JSON.stringify(currentStops));
                    } else {
                        currentStops = lerpStops(currentStops, targetStops, transitionProgress);
                    }
                    targetStops = JSON.parse(JSON.stringify(palettes[key].stops));
                    transitionProgress = 0;
                    currentPalette = key;
                    document.getElementById('paletteCurrent').textContent = palette.name;
                    buildPaletteList();
                });
                list.appendChild(div);
            });
        }

        buildModeList();
        buildPaletteList();

        // ============================================================
        // КВАНТОВОЕ ПОЛЕ
        // ============================================================
        const canvas = document.getElementById('vortex');
        const ctx = canvas.getContext('2d');

        let W, H, COLS, ROWS, TOTAL;
        let homeX, homeY, posX, posY, velX, velY, hue;
        let touchPoints = [];
        let mouseDown = false;
        let mousePos = { x: -9999, y: -9999 };
        const GAP = 3;
        const SINGULARITY = 4;

        const paletteSize = 1024;
        const palette = new Uint8Array(paletteSize * 3);

        let currentStops = JSON.parse(JSON.stringify(palettes.default.stops));
        let targetStops = JSON.parse(JSON.stringify(palettes.default.stops));
        let transitionProgress = 1;

        function hsvToRgb(h, s, v) {
            h = ((h % 360) + 360) % 360;
            const c = v * s;
            const x = c * (1 - Math.abs((h / 60) % 2 - 1));
            const m = v - c;
            let rr, gg, bb;
            if (h < 60)      [rr, gg, bb] = [c, x, 0];
            else if (h < 120) [rr, gg, bb] = [x, c, 0];
            else if (h < 180) [rr, gg, bb] = [0, c, x];
            else if (h < 240) [rr, gg, bb] = [0, x, c];
            else if (h < 300) [rr, gg, bb] = [x, 0, c];
            else              [rr, gg, bb] = [c, 0, x];
            return [
                Math.round((rr + m) * 255),
                Math.round((gg + m) * 255),
                Math.round((bb + m) * 255)
            ];
        }

        function lerpStops(a, b, t) {
            const result = [];
            const len = Math.max(a.length, b.length);
            for (let i = 0; i < len; i++) {
                const sa = a[i] || a[a.length - 1];
                const sb = b[i] || b[b.length - 1];
                let dh = sb.h - sa.h;
                if (dh > 180) dh -= 360;
                if (dh < -180) dh += 360;
                result.push({
                    pos: sa.pos + (sb.pos - sa.pos) * t,
                    h: sa.h + dh * t,
                    s: sa.s + (sb.s - sa.s) * t,
                    v: sa.v + (sb.v - sa.v) * t,
                });
            }
            return result;
        }

        function buildPalette(stops) {
            for (let i = 0; i < paletteSize; i++) {
                const t = i / (paletteSize - 1);
                let seg = 0;
                for (let s = 0; s < stops.length - 1; s++) {
                    if (t >= stops[s].pos && t <= stops[s + 1].pos) { seg = s; break; }
                }
                const a = stops[seg];
                const b = stops[seg + 1];
                const segT = (t - a.pos) / (b.pos - a.pos);
                let dh = b.h - a.h;
                if (dh > 180) dh -= 360;
                if (dh < -180) dh += 360;
                const h = a.h + dh * segT;
                const s = a.s + (b.s - a.s) * segT;
                const v = a.v + (b.v - a.v) * segT;
                const [rr, gg, bb] = hsvToRgb(h, s, v);
                const pi = i * 3;
                palette[pi] = rr;
                palette[pi + 1] = gg;
                palette[pi + 2] = bb;
            }
        }

        function getColor(t) {
            const idx = Math.min(paletteSize - 1, Math.max(0, Math.floor(t * (paletteSize - 1))));
            const i = idx * 3;
            return [palette[i], palette[i + 1], palette[i + 2]];
        }

        function init() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            COLS = Math.floor(W / GAP);
            ROWS = Math.floor(H / GAP);
            TOTAL = COLS * ROWS;

            homeX = new Float32Array(TOTAL);
            homeY = new Float32Array(TOTAL);
            posX = new Float32Array(TOTAL);
            posY = new Float32Array(TOTAL);
            velX = new Float32Array(TOTAL);
            velY = new Float32Array(TOTAL);
            hue = new Float32Array(TOTAL);

            const centerCol = (COLS - 1) / 2;
            const centerRow = (ROWS - 1) / 2;
            const maxDist = Math.sqrt(centerCol * centerCol + centerRow * centerRow);

            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const idx = row * COLS + col;
                    const hx = col * GAP;
                    const hy = row * GAP;
                    homeX[idx] = hx;
                    homeY[idx] = hy;
                    posX[idx] = hx;
                    posY[idx] = hy;
                    velX[idx] = 0;
                    velY[idx] = 0;

                    const dx = col - centerCol;
                    const dy = row - centerRow;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const distRatio = maxDist > 0 ? dist / maxDist : 0;
                    const proj = maxDist > 0 ? (dx * 0.7071 + dy * 0.7071) / maxDist : 0;
                    const k = 2.0 + distRatio * 4;
                    hue[idx] = 1 / (1 + Math.exp(-k * proj));
                }
            }
        }

        function getTotalForce(px, py) {
            let totalFx = 0, totalFy = 0;
            const allPoints = [...touchPoints];
            if (mouseDown) allPoints.push({ x: mousePos.x, y: mousePos.y });

            for (const point of allPoints) {
                const dx = point.x - px;
                const dy = point.y - py;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 0.2) continue;

                if (currentMode === 'vortex') {
                    if (dist < SINGULARITY) {
                        const force = 25;
                        const nx = dx / dist;
                        const ny = dy / dist;
                        totalFx += nx * force;
                        totalFy += ny * force;
                        continue;
                    }
                    const nx = dx / dist;
                    const ny = dy / dist;
                    const acceleration = 180 / (dist + 2);
                    totalFx += nx * acceleration;
                    totalFy += ny * acceleration;
                    totalFx += -ny * acceleration * 0.6;
                    totalFy += nx * acceleration * 0.6;
                } else if (currentMode === 'blackhole') {
                    const force = 200 / (dist * dist + 3);
                    const nx = dx / dist;
                    const ny = dy / dist;
                    totalFx += nx * force;
                    totalFy += ny * force;
                } else if (currentMode === 'horizon') {
                    if (dist < 8) continue;
                    if (dist < 18) {
                        const force = 2.0 / (dist - 7);
                        const nx = dx / dist;
                        const ny = dy / dist;
                        totalFx += nx * force;
                        totalFy += ny * force;
                    } else {
                        const force = 40 / dist;
                        const nx = dx / dist;
                        const ny = dy / dist;
                        totalFx += nx * force;
                        totalFy += ny * force;
                    }
                } else if (currentMode === 'antigravity') {
                    if (dist < 0.5) continue;
                    const force = -300 / (dist * dist + 5);
                    const nx = dx / dist;
                    const ny = dy / dist;
                    totalFx += nx * force;
                    totalFy += ny * force;
                } else if (currentMode === 'wave') {
                    if (dist < 0.5) continue;
                    const angle = Math.atan2(dy, dx);
                    const waveForce = 15 * Math.sin(dist * 0.3) / (dist * 0.1 + 1);
                    totalFx += Math.cos(angle) * waveForce;
                    totalFy += Math.sin(angle) * waveForce;
                } else if (currentMode === 'fibonacci') {
                    if (dist < 0.5) continue;
                    const PHI = 1.618;
                    const angle = Math.atan2(dy, dx);
                    const spiralAngle = Math.log(dist + 1) * PHI * 2.4;
                    const pushAngle = angle + spiralAngle;
                    const force = 8 / (dist * 0.3 + 0.5);
                    totalFx += Math.cos(pushAngle) * force;
                    totalFy += Math.sin(pushAngle) * force;
                    totalFx += Math.cos(angle + Math.PI / 2) * force * 0.6;
                    totalFy += Math.sin(angle + Math.PI / 2) * force * 0.6;
                } else if (currentMode === 'moire') {
                    if (dist < 0.5) continue;
                    const angle = Math.atan2(dy, dx);
                    const freq1 = Math.sin(dist * 0.15) * 0.5;
                    const freq2 = Math.cos(dist * 0.13 + angle * 3) * 0.5;
                    const moireForce = (freq1 + freq2) * 12 / (dist * 0.08 + 0.5);
                    totalFx += Math.cos(angle) * moireForce;
                    totalFy += Math.sin(angle) * moireForce;
                    const perpForce = Math.sin(dist * 0.1 + angle * 5) * 6 / (dist * 0.05 + 0.5);
                    totalFx += Math.cos(angle + Math.PI / 2) * perpForce;
                    totalFy += Math.sin(angle + Math.PI / 2) * perpForce;
                } else if (currentMode === 'mycelium') {
                    if (dist < 0.5) continue;
                    const angle = Math.atan2(dy, dx);
                    const pulse = Math.sin(Date.now() * 0.002 + dist * 0.1) * 0.5 + 0.5;
                    const force = 6 / (dist * 0.15 + 0.5) * (0.6 + pulse * 0.4);
                    totalFx += Math.cos(angle) * force;
                    totalFy += Math.sin(angle) * force;
                    const branchForce = Math.sin(angle * 3 + Date.now() * 0.001) * 3 / (dist * 0.1 + 0.5);
                    totalFx += Math.cos(angle + Math.PI / 2) * branchForce;
                    totalFy += Math.sin(angle + Math.PI / 2) * branchForce;
                } else if (currentMode === 'plankton') {
                    if (dist < 0.5) continue;
                    const angle = Math.atan2(dy, dx);
                    const drift = Math.sin(Date.now() * 0.003 + px * 0.05) * Math.cos(Date.now() * 0.002 + py * 0.05);
                    const force = 4 / (dist * 0.2 + 0.5) + drift * 2;
                    totalFx += Math.cos(angle) * force;
                    totalFy += Math.sin(angle) * force;
                } else if (currentMode === 'swarm') {
                    if (dist < 0.5) continue;
                    const angle = Math.atan2(dy, dx);
                    const cohesion = 5 / (dist * 0.2 + 0.5);
                    const separation = dist < 20 ? -15 / (dist * dist * 0.05 + 0.5) : 0;
                    const alignment = Math.sin(Date.now() * 0.001 + angle * 2) * 3;
                    const force = cohesion + separation + alignment;
                    totalFx += Math.cos(angle) * force;
                    totalFy += Math.sin(angle) * force;
                }
            }
            return { fx: totalFx, fy: totalFy };
        }

        function update(dt) {
            const dt60 = Math.min(3, dt * 60);
            const isActive = touchPoints.length > 0 || mouseDown;

            if (transitionProgress < 1) {
                transitionProgress = Math.min(1, transitionProgress + dt * 3);
                const blended = lerpStops(currentStops, targetStops, transitionProgress);
                buildPalette(blended);
                if (transitionProgress >= 1) {
                    currentStops = JSON.parse(JSON.stringify(targetStops));
                }
            }

            for (let i = 0; i < TOTAL; i++) {
                let fx = 0, fy = 0;
                const px = posX[i];
                const py = posY[i];

                if (isActive) {
                    const force = getTotalForce(px, py);
                    fx += force.fx;
                    fy += force.fy;
                    velX[i] = (velX[i] + fx * dt60) * 0.92;
                    velY[i] = (velY[i] + fy * dt60) * 0.92;
                    const speed = Math.sqrt(velX[i] * velX[i] + velY[i] * velY[i]);
                    if (speed > 25) {
                        velX[i] = velX[i] / speed * 25;
                        velY[i] = velY[i] / speed * 25;
                    }
                } else {
                    const dxHome = homeX[i] - px;
                    const dyHome = homeY[i] - py;
                    const distHome = Math.sqrt(dxHome * dxHome + dyHome * dyHome);
                    if (distHome < 0.15) {
                        posX[i] = homeX[i];
                        posY[i] = homeY[i];
                        velX[i] = 0;
                        velY[i] = 0;
                        continue;
                    }
                    const lerpFactor = 0.04 * dt60;
                    posX[i] = px + dxHome * lerpFactor;
                    posY[i] = py + dyHome * lerpFactor;
                    velX[i] = dxHome * lerpFactor;
                    velY[i] = dyHome * lerpFactor;
                    continue;
                }
            }
            if (isActive) {
                for (let i = 0; i < TOTAL; i++) {
                    posX[i] += velX[i] * dt60;
                    posY[i] += velY[i] * dt60;
                }
            }
        }

        function render() {
            const imgData = ctx.createImageData(W, H);
            const pixels = imgData.data;
            for (let i = 0; i < pixels.length; i += 4) {
                pixels[i] = 0; pixels[i+1] = 0; pixels[i+2] = 0; pixels[i+3] = 255;
            }
            for (let i = 0; i < TOTAL; i++) {
                const px = posX[i];
                const py = posY[i];
                const fx = px - Math.floor(px);
                const fy = py - Math.floor(py);
                const cx = Math.floor(px);
                const cy = Math.floor(py);
                const [r, g, b] = getColor(hue[i]);

                for (let dy = -1; dy <= 2; dy++) {
                    for (let dx = -1; dx <= 2; dx++) {
                        const sx = cx + dx;
                        const sy = cy + dy;
                        if (sx < 0 || sx >= W || sy < 0 || sy >= H) continue;
                        const pxDist = (dx + 1 - fx);
                        const pyDist = (dy + 1 - fy);
                        const dist = Math.sqrt(pxDist * pxDist + pyDist * pyDist);
                        const weight = Math.exp(-dist * dist / 0.72);
                        if (weight < 0.02) continue;
                        const si = (sy * W + sx) * 4;
                        const br = weight * 1.2;
                        pixels[si] = Math.min(255, pixels[si] + r * br);
                        pixels[si+1] = Math.min(255, pixels[si+1] + g * br);
                        pixels[si+2] = Math.min(255, pixels[si+2] + b * br);
                        pixels[si+3] = 255;
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        let lastTime = performance.now();
        let animFrame;

        function loop(timestamp) {
            const dt = Math.min(0.1, (timestamp - lastTime) / 1000);
            lastTime = timestamp;
            update(dt);
            render();
            animFrame = requestAnimationFrame(loop);
        }

        function updateTouchPoints(e) {
            touchPoints = [];
            for (let i = 0; i < e.touches.length; i++) {
                touchPoints.push({
                    x: e.touches[i].clientX,
                    y: e.touches[i].clientY,
                    id: e.touches[i].identifier
                });
            }
        }

        canvas.addEventListener('mousedown', function(e) {
            if (e.target.closest('.menu-toggle') || e.target.closest('.side-panel') || e.target.closest('.overlay')) return;
            if (e.button === 0) { mouseDown = true; mousePos = { x: e.clientX, y: e.clientY }; e.preventDefault(); }
        });
        window.addEventListener('mousemove', function(e) {
            if (e.target.closest('.side-panel') || e.target.closest('.menu-toggle')) return;
            mousePos = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('mouseup', function(e) { if (e.button === 0) mouseDown = false; });

        canvas.addEventListener('touchstart', function(e) {
            if (e.target.closest('.side-panel') || e.target.closest('.menu-toggle') || e.target.closest('.overlay')) return;
            e.preventDefault();
            updateTouchPoints(e);
        }, { passive: false });
        canvas.addEventListener('touchmove', function(e) {
            if (e.target.closest('.side-panel') || e.target.closest('.menu-toggle')) return;
            e.preventDefault();
            updateTouchPoints(e);
        }, { passive: false });
        canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            updateTouchPoints(e);
        }, { passive: false });
        canvas.addEventListener('touchcancel', function(e) {
            e.preventDefault();
            touchPoints = [];
        }, { passive: false });

        window.addEventListener('blur', function() { mouseDown = false; touchPoints = []; });
        window.addEventListener('resize', function() {
            cancelAnimationFrame(animFrame);
            init();
            lastTime = performance.now();
            animFrame = requestAnimationFrame(loop);
        });
        canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

        // ============================================================
        // ЗАПУСК
        // ============================================================
        buildPalette(currentStops);
        init();
        render();
        animFrame = requestAnimationFrame(loop);
    </script>
</body>
</html>
